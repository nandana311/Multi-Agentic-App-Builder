<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="calculator" class="calculator">
        <div id="display" class="calculator__display"></div>
        <div class="calculator__buttons">
            <button id="clear" class="calculator__button calculator__button--clear">C</button>
            <button id="divide" class="calculator__button calculator__button--operator">/</button>
            <button id="multiply" class="calculator__button calculator__button--operator">*</button>
            <button id="subtract" class="calculator__button calculator__button--operator">-</button>
            <button id="seven" class="calculator__button">7</button>
            <button id="eight" class="calculator__button">8</button>
            <button id="nine" class="calculator__button">9</button>
            <button id="add" class="calculator__button calculator__button--operator">+</button>
            <button id="four" class="calculator__button">4</button>
            <button id="five" class="calculator__button">5</button>
            <button id="six" class="calculator__button">6</button>
            <button id="one" class="calculator__button">1</button>
            <button id="two" class="calculator__button">2</button>
            <button id="three" class="calculator__button">3</button>
            <button id="zero" class="calculator__button">0</button>
            <button id="equals" class="calculator__button calculator__button--equals">=</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
